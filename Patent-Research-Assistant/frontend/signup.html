
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up - Patent Research Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">🔍 Patent Research Assistant</a>
    </div>
  </nav>

  <main class="container">
    <div class="auth-card">
      <h3 class="mb-4">Create an account</h3>
      <form id="signup-form" class="mb-4">
        <div class="mb-3">
          <label class="form-label" for="signup-email">Email</label>
          <input type="email" id="signup-email" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label" for="signup-password">Password</label>
          <input type="password" id="signup-password" class="form-control" minlength="8" required />
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign up</button>
      </form>

      <hr />

      <h6 class="mb-3">Have a confirmation code?</h6>
      <form id="confirm-form">
        <div class="mb-3">
          <label class="form-label" for="confirm-email">Email</label>
          <input type="email" id="confirm-email" class="form-control" required />
        </div>
        <div class="mb-3">
          <label class="form-label" for="confirm-code">Confirmation code</label>
          <input type="text" id="confirm-code" class="form-control" required />
        </div>
        <button type="submit" class="btn btn-outline-primary w-100">Confirm account</button>
      </form>

      <p id="auth-message" class="mt-3 d-none"></p>
      <p class="text-center mt-3 mb-0">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
