
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patent Research Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/styles.css" rel="stylesheet" />
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">🔍 Patent Research Assistant</a>
      <div class="d-flex align-items-center gap-2">
        <a class="btn btn-outline-secondary btn-sm" href="login.html">Log in</a>
        <a class="btn btn-primary btn-sm" href="signup.html">Sign up</a>
        <button id="theme-toggle" class="theme-toggle" title="Toggle theme">
          <span id="theme-icon">🌙</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="text-center mb-4">
      <h1 class="fw-bold">Ask a question. Get grounded patent answers.</h1>
      <p class="text-muted">Retrieval-Augmented Generation over USPTO full-text patent grants.</p>
    </div>

    <div class="search-card mx-auto" style="max-width: 760px">
      <form id="search-form">
        <div class="search-input-group">
          <input
            type="text"
            id="search-input"
            class="form-control form-control-lg"
            placeholder="e.g. What approaches exist for solid-state battery electrolytes?"
            autocomplete="off"
            required
          />
          <button type="button" id="mic-button" class="btn mic-button" title="Search by voice">🎙️</button>
          <button type="submit" id="search-submit" class="btn btn-primary">
            Search
            <span id="search-spinner" class="spinner-border spinner-border-sm d-none ms-1" role="status"></span>
          </button>
        </div>
      </form>
    </div>

    <div class="mx-auto d-none" style="max-width: 760px">
      <div class="answer-card">
        <h5 class="mb-2">Answer</h5>
        <div id="answer"></div>
      </div>
      <div id="results"></div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
